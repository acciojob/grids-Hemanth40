<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bootstrap Grid Layout</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"/>
  <style>
    .container {
      width: 600px;
      max-width: 600px;
      border: 5px solid rgb(4, 255, 4);
      background-color: rgb(41, 0, 0);
    }
    .row {
      border: 5px solid rgb(255, 188, 188);
      height: 200px;
    }
    .col, [class*="col-"] {
      border: 2px dotted rgb(38, 38, 43);
    }
    .r1c1 { background-color: teal; }
    .r1c2 { background-color: thistle; }
    .r2c1 { background-color: tomato; }
    .r2c2 { background-color: turquoise; }
    .r3c1 { background-color: violet; }
    .r3c2 { background-color: yellowgreen; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Row 1: md → 4/8 split | sm → equal (col-sm-6) -->
    <div class="row">
      <div class="col-sm-6 col-md-4 r1c1">Row1 col1</div>
      <div class="col-sm-6 col-md-8 r1c2">Row1 col2</div>
    </div>

    <!-- Row 2: offset-md-2, justify-content-between, md only -->
    <div class="row justify-content-between">
      <div class="col-md-4 offset-md-2 r2c1">Row2 col1</div>
      <div class="col-md-4 r2c2">Row2 col2</div>
    </div>

    <!-- Row 3: centered, md → 4/4 | sm → col-sm-6 equal -->
    <div class="row justify-content-center">
      <div class="col-sm-6 col-md-4 r3c1">Row3 col1</div>
      <div class="col-sm-6 col-md-4 r3c2">Row3 col2</div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
